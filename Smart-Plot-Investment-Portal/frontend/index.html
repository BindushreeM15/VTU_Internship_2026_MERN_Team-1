<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/favicon.png" />

        <!-- Viewport -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Title -->
        <title>PlotVest — Smart Plot Investment Platform</title>

        <!-- Meta Description -->
        <meta
            name="description"
            content="PlotVest is a modern platform to discover, manage, and invest in real estate plots. Builders can list projects, investors can explore opportunities — all in one place."
        />

        <!-- Theme Color -->
        <meta name="theme-color" content="#0f172a" />

        <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
        <meta
            property="og:title"
            content="PlotVest — Smart Plot Investment Platform"
        />
        <meta
            property="og:description"
            content="Discover and invest in premium real estate plots. Manage projects, track listings, and grow your portfolio with PlotVest."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://your-domain.vercel.app" />
        <meta property="og:image" content="/og-image.png" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="PlotVest — Smart Plot Investment Platform"
        />
        <meta
            name="twitter:description"
            content="Explore real estate plots, manage projects, and invest smarter with PlotVest."
        />
        <meta name="twitter:image" content="/og-image.png" />

        <!-- App Name -->
        <meta name="application-name" content="PlotVest" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
